spack:
  view: true
  concretizer:
    unify: when_possible
  repos:
  - "./lfric-isambard-spack_repo"
  - "./working_dir/simit-spack-main/repos/metoffice"
  packages:
    all:
      compiler: ["nvhpc"]
      providers:
        mpi: [mpich]
    python:
      compiler: ["gcc@12.3.0"]
      variants: +shared
    py-*:
      compiler: ["gcc@12.3.0"]
    py-setuptools:
      version: [":79"]
  specs:
  - "lfric-apps-isambard %nvhpc"
