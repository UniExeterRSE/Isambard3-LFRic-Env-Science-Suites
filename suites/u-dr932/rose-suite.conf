# Config Options ' (cylc-install)' from CLI appended to options already in `rose-suite.conf`.
opts=(cylc-install)

[file:bin/get_git_sources.py]
source=git:git@github.com:MetOffice/SimSys_Scripts.git::github_scripts/get_git_sources.py::main

[file:bin/merge_sources.py]
source=git:git@github.com:MetOffice/SimSys_Scripts.git::github_scripts/merge_sources.py::main

[file:bin/tweak_iodef]
mode=auto
source=git:https://github.com/MetOffice/lfric_core.git::bin/tweak_iodef::main

[template variables]
ACTIVATE_ENV=''
BUILD_LFRIC=true
CASE_SETUP='shallow-hot-jupiter'
COMPILER='gnu'
EXPT_DT=1200.0
EXPT_RESUB='P1D'
EXPT_RUNLEN='P1D'
EXPT_START='20000101T0000Z'
EX_HOST='isambard3'
ISAMBARD3_RUN_PARTITION='grace'
ISAMBARD3_SHARED_PARTITION='grace'
ISAMBARD3_SPACK_ENV='lfric-apps-isambard'
ISAMBARD3_SPACK_SETUP=''
LFRIC_CPU='PT1H'
LFRIC_LEVS=''
LFRIC_RES='C48_MG'
MIRROR_LOC=""
PHYSICS_CONF=''
TOTAL_RANKS_REQ=64
USE_MIRRORS=false
USE_TOKENS=false
VN='2.2'
