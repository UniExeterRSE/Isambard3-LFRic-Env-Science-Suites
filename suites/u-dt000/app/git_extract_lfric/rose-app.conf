mode=command
opt.jobs=1

[command]
default=bash -eu -o pipefail -c '
       =extract_dir="${CYLC_WORKFLOW_SHARE_DIR}/git_extract_lfric/extract"
       =deps_dir="${extract_dir}/deps"
       =rm -rf "${extract_dir}"
       =mkdir -p "${extract_dir}" "${deps_dir}"
       =if [ -n "${GIT_SSH_KEY:-}" ]; then
       =  export GIT_SSH_COMMAND="ssh -i ${GIT_SSH_KEY} -o BatchMode=yes -o StrictHostKeyChecking=accept-new"
       =elif [ -n "${GIT_SSH_COMMAND:-}" ]; then
       =  export GIT_SSH_COMMAND="${GIT_SSH_COMMAND}"
       =else
       =  export GIT_SSH_COMMAND="ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new"
       =fi
       =if [ -z "${SSH_AUTH_SOCK:-}" ]; then
       =  echo "WARN: SSH_AUTH_SOCK is not set; ensure ssh-agent forwarding if using agent keys." >&2
       =fi
       =git_cmd=(git -c credential.helper=)
       ="${git_cmd[@]}" clone --branch "${LFRIC_APPS_REF}" --depth 1 "${LFRIC_APPS_REMOTE}" "${extract_dir}/lfric_apps"
       ="${git_cmd[@]}" clone --branch "${LFRIC_CORE_REF}" --depth 1 "${LFRIC_CORE_REMOTE}" "${extract_dir}/lfric_core"
       =. "${extract_dir}/lfric_apps/dependencies.sh"
       =if [ -n "${JULES_REV_OVERRIDE:-}" ]; then
       =  jules_rev="${JULES_REV_OVERRIDE}"
       =fi
       =clone_dep() {
       =  name="$1"
       =  rev="$2"
       =  remote="$3"
       =  dest="${deps_dir}/${name}"
       =  if [ -z "${remote}" ]; then
       =    echo "ERROR: missing remote for ${name}" >&2
       =    exit 1
       =  fi
       =  if [ -n "${rev}" ]; then
       =    if [ "${name}" = "jules" ] && [ -n "${JULES_FALLBACK:-}" ]; then
       =      if ! "${git_cmd[@]}" clone --branch "${rev}" --depth 1 "${remote}" "${dest}"; then
       =        echo "WARN: ${name} rev ${rev} not found; falling back to ${JULES_FALLBACK}" >&2
       =        rm -rf "${dest}"
       =        "${git_cmd[@]}" clone --branch "${JULES_FALLBACK}" --depth 1 "${remote}" "${dest}"
       =      fi
       =    else
       =      "${git_cmd[@]}" clone --branch "${rev}" --depth 1 "${remote}" "${dest}"
       =    fi
       =  else
       =    "${git_cmd[@]}" clone --depth 1 "${remote}" "${dest}"
       =  fi
       =}
       =if [ -n "${casim_sources:-}" ]; then echo "WARN: casim_sources ignored: ${casim_sources}" >&2; fi
       =if [ -n "${ukca_sources:-}" ]; then echo "WARN: ukca_sources ignored: ${ukca_sources}" >&2; fi
       =if [ -n "${jules_sources:-}" ]; then echo "WARN: jules_sources ignored: ${jules_sources}" >&2; fi
       =if [ -n "${socrates_sources:-}" ]; then echo "WARN: socrates_sources ignored: ${socrates_sources}" >&2; fi
       =clone_dep "casim" "${casim_rev:-}" "${CASIM_REMOTE}"
       =clone_dep "ukca" "${ukca_rev:-}" "${UKCA_REMOTE}"
       =clone_dep "jules" "${jules_rev:-}" "${JULES_REMOTE}"
       =clone_dep "socrates" "${socrates_rev:-}" "${SOCRATES_REMOTE}"
       ="${ROSE_SUITE_DIR}/bin/patch_lfric_git_deps.py" "${extract_dir}/lfric_apps"
       ='

[env]
LFRIC_APPS_REF=vn2.2
LFRIC_APPS_REMOTE=git@github.com:MetOffice/lfric_apps.git
LFRIC_CORE_REF=core2.2
LFRIC_CORE_REMOTE=git@github.com:MetOffice/lfric_core.git
CASIM_REMOTE=git@github.com:MetOffice/casim.git
UKCA_REMOTE=git@github.com:MetOffice/ukca.git
JULES_REMOTE=git@github.com:MetOffice/JULES.git
JULES_FALLBACK=stable
SOCRATES_REMOTE=git@github.com:MetOffice/socrates.git
